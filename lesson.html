<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,400;1,500&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #EAEEE6;
    --card: #FAFBF7;
    --ink: #1E2A22;
    --moss: #1F6F5C;
    --rust: #B6481E;
    --mute: #6E7568;
    --line: #D4D8D0;
    --nav-bg: #1E2A22;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
  }

  /* ── NAV ── */
  .nav {
    width: 210px; flex-shrink: 0;
    background: var(--nav-bg); min-height: 100vh;
    display: flex; flex-direction: column;
    padding: 1.5rem 1rem;
    position: fixed; top: 0; left: 0; bottom: 0;
  }

  .nav-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 0 0.25rem; margin-bottom: 2rem; text-decoration: none;
  }

  .nav-seal {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--moss);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  .nav-seal span { font-family: 'Fraunces', serif; font-style: italic; color: var(--paper); font-size: 15px; line-height: 1; }

  .nav-title-wrap { display: flex; flex-direction: column; }
  .nav-title-top { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: rgba(234,238,230,0.4); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.3; }
  .nav-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 16px; color: var(--paper); line-height: 1.1; }

  .nav-items { display: flex; flex-direction: column; gap: 2px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; text-decoration: none; transition: background 0.12s; }
  .nav-item:hover:not(.active) { background: rgba(234,238,230,0.05); }
  .nav-item.active { background: rgba(234,238,230,0.09); }
  .nav-icon { font-size: 16px; color: rgba(234,238,230,0.45); line-height: 1; }
  .nav-item.active .nav-icon, .nav-item:hover .nav-icon { color: var(--paper); }
  .nav-text { font-size: 13px; color: rgba(234,238,230,0.45); }
  .nav-item.active .nav-text, .nav-item:hover .nav-text { color: var(--paper); font-weight: 500; }

  .nav-spacer { flex: 1; }

  .nav-user { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 8px; background: rgba(234,238,230,0.06); cursor: pointer; position: relative; }
  .nav-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--moss); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--paper); flex-shrink: 0; }
  .nav-user-info { flex: 1; min-width: 0; }
  .nav-user-name { font-size: 12px; color: rgba(234,238,230,0.8); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-user-level { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: rgba(234,238,230,0.35); }

  .nav-dropdown { position: absolute; bottom: calc(100% + 6px); left: 0; right: 0; background: #2a3a30; border: 1px solid rgba(234,238,230,0.1); border-radius: 8px; overflow: hidden; display: none; z-index: 10; }
  .nav-dropdown.open { display: block; }
  .nav-dropdown-item { display: block; width: 100%; padding: 10px 14px; font-size: 12px; color: rgba(234,238,230,0.7); background: none; border: none; text-align: left; cursor: pointer; text-decoration: none; }
  .nav-dropdown-item:hover { background: rgba(234,238,230,0.06); color: var(--paper); }
  .nav-dropdown-item.signout { color: rgba(182,72,30,0.8); border-top: 1px solid rgba(234,238,230,0.07); }
  .nav-dropdown-item.signout:hover { background: rgba(182,72,30,0.08); color: #B6481E; }

  /* ── MAIN ── */
  .main { margin-left: 210px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  .lesson-bar {
    padding: 1rem 1.75rem;
    background: var(--card); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 5;
  }

  .back-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--mute); cursor: pointer; text-decoration: none;
    display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  }
  .back-btn:hover { color: var(--moss); }

  .lesson-bar-title { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
  .lesson-bar-unit { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--mute); letter-spacing: 0.08em; text-transform: uppercase; }
  .lesson-bar-name { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; }

  .progress-track { flex: 1; height: 5px; background: var(--line); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--moss); border-radius: 99px; transition: width 0.4s ease; width: 0%; }
  .progress-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--moss); white-space: nowrap; }

  .lesson-content { flex: 1; overflow-y: auto; padding: 1.75rem; display: flex; flex-direction: column; gap: 1rem; max-width: 720px; }

  /* Read & learn */
  .read-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .read-header { padding: 0.75rem 1.1rem; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
  .read-header-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mute); }
  .read-body { padding: 1.1rem; }
  .read-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 19px; color: var(--ink); margin-bottom: 0.75rem; line-height: 1.25; }
  .read-text { font-size: 13.5px; color: var(--ink); line-height: 1.75; margin-bottom: 0.85rem; }
  .read-text:last-child { margin-bottom: 0; }

  .example-box { background: rgba(31,111,92,0.06); border-left: 3px solid var(--moss); border-radius: 0 8px 8px 0; padding: 0.85rem 1.1rem; margin: 0.85rem 0; }
  .example-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--moss); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .example-text { font-size: 13.5px; color: var(--ink); line-height: 1.7; }

  /* Dig deeper */
  .dig-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .dig-header { padding: 0.75rem 1.1rem; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .dig-header-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mute); display: flex; align-items: center; gap: 6px; }
  .dig-source { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--mute); background: var(--paper); padding: 2px 8px; border-radius: 99px; }
  .dig-body { padding: 1.1rem; }
  .dig-term { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--moss); margin-bottom: 4px; }
  .dig-def { font-size: 12.5px; color: var(--ink); line-height: 1.65; }

  /* Question card */
  .q-card { background: var(--card); border: 1px solid var(--moss); border-radius: 12px; overflow: hidden; }
  .q-header { padding: 0.75rem 1.1rem; background: var(--moss); display: flex; align-items: center; justify-content: space-between; }
  .q-header-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(234,238,230,0.75); }
  .q-counter { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: rgba(234,238,230,0.65); }
  .q-body { padding: 1.1rem; }
  .q-type-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--moss); background: rgba(31,111,92,0.1); padding: 2px 8px; border-radius: 99px; display: inline-block; margin-bottom: 0.65rem; }
  .q-text { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 1rem; line-height: 1.55; }

  /* True / false */
  .tf-row { display: flex; gap: 10px; margin-bottom: 0.9rem; }
  .tf-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--line); background: var(--card); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--ink); cursor: pointer; text-align: center; transition: border-color 0.15s, background 0.15s; }
  .tf-btn:hover:not(:disabled) { border-color: var(--moss); }
  .tf-btn.selected { border-color: var(--moss); background: rgba(31,111,92,0.08); color: var(--moss); }
  .tf-btn.correct-answer { border-color: var(--moss); background: rgba(31,111,92,0.08); color: var(--moss); }
  .tf-btn.wrong-answer { border-color: var(--rust); background: rgba(182,72,30,0.07); color: var(--rust); text-decoration: line-through; opacity: 0.75; }
  .tf-btn:disabled { cursor: default; }

  /* Fill in blank */
  .fitb-row { font-size: 14px; color: var(--ink); line-height: 2.4; margin-bottom: 0.9rem; }
  .fitb-input { border: none; border-bottom: 2px solid var(--moss); background: transparent; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--moss); padding: 2px 6px; outline: none; min-width: 130px; text-align: center; }
  .fitb-input:disabled { color: var(--mute); }
  .fitb-answer-shown { font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 2px 10px; border-radius: 6px; display: inline-block; }
  .fitb-answer-shown.correct { background: rgba(31,111,92,0.1); color: var(--moss); border-bottom: 2px solid var(--moss); }
  .fitb-answer-shown.incorrect { background: rgba(182,72,30,0.07); color: var(--rust); border-bottom: 2px solid var(--rust); text-decoration: line-through; }
  .fitb-correct-inline { font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 2px 10px; border-radius: 6px; display: inline-block; background: rgba(31,111,92,0.1); color: var(--moss); border-bottom: 2px solid var(--moss); margin-left: 6px; }

  /* Matching */
  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0.9rem; }
  .match-col-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--mute); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
  .match-item { padding: 9px 11px; border-radius: 8px; border: 1px solid var(--line); background: var(--card); font-size: 12.5px; color: var(--ink); cursor: pointer; margin-bottom: 8px; transition: border-color 0.15s, background 0.15s; }
  .match-item.selected { border-color: var(--moss); background: rgba(31,111,92,0.08); color: var(--moss); }
  .match-item.paired { border-color: var(--moss); background: rgba(31,111,92,0.14); color: var(--moss); font-weight: 500; }
  .match-item.paired::after { content: " ✓"; }
  .match-item.matched-correct { border-color: var(--moss); background: rgba(31,111,92,0.08); color: var(--moss); opacity: 0.7; }
  .match-item.matched-incorrect { border-color: var(--rust); background: rgba(182,72,30,0.07); color: var(--rust); opacity: 0.7; }
  .match-item:disabled, .match-item.locked { cursor: default; }

  /* Feedback box */
  .feedback-box { border-radius: 8px; padding: 0.8rem 1rem; margin-bottom: 0.9rem; display: flex; gap: 10px; align-items: flex-start; }
  .feedback-box.correct { background: rgba(31,111,92,0.07); border: 1px solid rgba(31,111,92,0.2); }
  .feedback-box.incorrect { background: rgba(182,72,30,0.06); border: 1px solid rgba(182,72,30,0.15); }
  .feedback-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .feedback-icon.correct { color: var(--moss); }
  .feedback-icon.incorrect { color: var(--rust); }
  .feedback-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .feedback-title.correct { color: var(--moss); }
  .feedback-title.incorrect { color: var(--rust); }
  .feedback-text { font-size: 12.5px; color: var(--ink); line-height: 1.6; }
  .xp-pill { display: inline-flex; align-items: center; gap: 5px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 10px; border-radius: 99px; margin-top: 6px; background: rgba(31,111,92,0.1); color: var(--moss); }

  .q-footer { padding: 0 1.1rem 1.1rem; display: flex; justify-content: flex-end; }
  .action-btn { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 22px; border-radius: 8px; border: none; cursor: pointer; color: var(--paper); background: var(--moss); transition: opacity 0.15s; }
  .action-btn:hover { opacity: 0.9; }
  .action-btn:disabled { opacity: 0.4; cursor: default; }
  .action-btn.incorrect-next { background: var(--rust); }

  /* Completion screen */
  .complete-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .complete-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; width: 100%; max-width: 420px; overflow: hidden; }
  .complete-top { background: var(--moss); padding: 2.25rem 1.5rem; text-align: center; }
  .complete-seal { width: 56px; height: 56px; border-radius: 50%; background: rgba(234,238,230,0.15); border: 2px solid rgba(234,238,230,0.3); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
  .complete-seal span { font-family: 'Fraunces', serif; font-style: italic; color: var(--paper); font-size: 26px; }
  .complete-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; color: var(--paper); margin-bottom: 0.25rem; }
  .complete-sub { font-size: 13px; color: rgba(234,238,230,0.7); }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid var(--line); }
  .stat { padding: 1rem 0.75rem; text-align: center; border-right: 1px solid var(--line); }
  .stat:last-child { border-right: none; }
  .stat-value { font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; color: var(--moss); margin-bottom: 3px; }
  .stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--mute); letter-spacing: 0.07em; text-transform: uppercase; }
  .complete-actions { padding: 1.25rem; display: flex; gap: 8px; }
  .btn-secondary { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--line); background: var(--card); font-size: 13px; color: var(--mute); cursor: pointer; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; }
  .btn-primary { flex: 2; padding: 10px; border-radius: 8px; border: none; background: var(--moss); font-size: 13px; font-weight: 500; color: var(--paper); cursor: pointer; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; }

  body.loading .main { opacity: 0; }
  body.ready .main { opacity: 1; transition: opacity 0.2s; }
</style>
</head>

<script>
const API = '/auth';
const PROGRESS_API = '/progress';

const LEVEL_TITLES = ['Curious Mind','Microscopist','Lab Trainee','Field Researcher','Lab Technician','Research Associate','Research Scientist','Senior Scientist','Research Fellow','Principal Scientist'];
const LEVEL_THRESHOLDS = [0,100,300,600,1000,1500,2200,3000,4000,5500];

function calcLevel(xp) {
  let level = 1;
  for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) { if (xp >= LEVEL_THRESHOLDS[i]) { level = i + 1; break; } }
  return Math.min(level, 10);
}
function initials(name) { return name.slice(0, 2).toUpperCase(); }

const params = new URLSearchParams(window.location.search);
const courseParam = params.get('course') || 'cell_biology';
const unitParam = parseInt(params.get('unit') || '1', 10);
const lessonParam = parseInt(params.get('lesson') || '1', 10);

let currentQIndex = 0;
let correctCount = 0;
let lessonData = null;
let answeredCurrent = false;

document.getElementById('back-link').href = `/cellbiology`;

async function loadLesson() {
  const res = await fetch(`/content/${courseParam.replace('_','-')}/unit-${unitParam}-lesson-${lessonParam}.json`);
  if (!res.ok) throw new Error('Lesson content not found');
  return res.json();
}

function renderReadSection(data) {
  const container = document.getElementById('lesson-content');

  const readCard = document.createElement('div');
  readCard.className = 'read-card';

  let paragraphsHtml = data.read.paragraphs.map(p => `<p class="read-text">${p}</p>`).join('');

  let exampleHtml = '';
  if (data.example) {
    exampleHtml = `
      <div class="example-box">
        <p class="example-label">${data.example.label || 'Example'}</p>
        <p class="example-text">${data.example.text}</p>
      </div>`;
  }

  let extraHtml = '';
  if (data.read_extra && data.read_extra.length) {
    extraHtml = data.read_extra.map(p => `<p class="read-text">${p}</p>`).join('');
  }

  readCard.innerHTML = `
    <div class="read-header">
      <span class="read-header-label">Read &amp; learn</span>
    </div>
    <div class="read-body">
      <h2 class="read-title">${data.read.heading}</h2>
      ${paragraphsHtml}
      ${exampleHtml}
      ${extraHtml}
    </div>`;

  container.appendChild(readCard);

  if (data.dig_deeper) {
    const digCard = document.createElement('div');
    digCard.className = 'dig-card';
    digCard.innerHTML = `
      <div class="dig-header">
        <span class="dig-header-label">Dig deeper</span>
        <span class="dig-source">Specimen data</span>
      </div>
      <div class="dig-body">
        <p class="dig-term">${data.dig_deeper.term}</p>
        <p class="dig-def">${data.dig_deeper.definition}</p>
      </div>`;
    container.appendChild(digCard);
  }
}

function renderQuestion(data, qIndex) {
  const container = document.getElementById('lesson-content');
  const existing = document.getElementById('q-card');
  if (existing) existing.remove();

  const q = data.questions[qIndex];
  answeredCurrent = false;

  const qCard = document.createElement('div');
  qCard.className = 'q-card';
  qCard.id = 'q-card';

  const typeLabel = q.type === 'true_false' ? 'True / False' : q.type === 'fill_in_blank' ? 'Fill in the blank' : 'Matching';

  let bodyHtml = `
    <span class="q-type-badge">${typeLabel}</span>
    <p class="q-text">${q.text}</p>
    <div id="q-interactive"></div>
    <div id="q-feedback"></div>`;

  qCard.innerHTML = `
    <div class="q-header">
      <span class="q-header-label">Question</span>
      <span class="q-counter">${qIndex + 1} of ${data.questions.length}</span>
    </div>
    <div class="q-body">${bodyHtml}</div>
    <div class="q-footer"><button class="action-btn" id="action-btn" disabled>Check</button></div>`;

  container.appendChild(qCard);
  qCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  const interactive = document.getElementById('q-interactive');
  const actionBtn = document.getElementById('action-btn');

  if (q.type === 'true_false') {
    interactive.innerHTML = `
      <div class="tf-row">
        <button class="tf-btn" data-val="true">True</button>
        <button class="tf-btn" data-val="false">False</button>
      </div>`;
    let selected = null;
    interactive.querySelectorAll('.tf-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        interactive.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selected = btn.dataset.val === 'true';
        actionBtn.disabled = false;
      });
    });
    actionBtn.addEventListener('click', () => handleAnswer(q, selected === q.correct, () => {
      interactive.querySelectorAll('.tf-btn').forEach(b => {
        b.disabled = true;
        const isThisCorrect = (b.dataset.val === 'true') === q.correct;
        if (isThisCorrect) b.classList.add('correct-answer');
        else if (b.classList.contains('selected')) b.classList.add('wrong-answer');
      });
    }));

  } else if (q.type === 'fill_in_blank') {
    interactive.innerHTML = `
      <div class="fitb-row">${q.sentence_before}<input class="fitb-input" type="text" id="fitb-input" placeholder="type your answer" />${q.sentence_after}</div>`;
    const input = document.getElementById('fitb-input');
    input.addEventListener('input', () => { actionBtn.disabled = input.value.trim().length === 0; });
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !actionBtn.disabled) actionBtn.click(); });
    actionBtn.addEventListener('click', () => {
      const val = input.value.trim().toLowerCase();
      const correct = val === q.answer.toLowerCase();
      handleAnswer(q, correct, () => {
        input.disabled = true;
        const row = input.parentElement;
        if (correct) {
          row.innerHTML = `${q.sentence_before}<span class="fitb-answer-shown correct">${q.answer}</span>${q.sentence_after}`;
        } else {
          row.innerHTML = `${q.sentence_before}<span class="fitb-answer-shown incorrect">${input.value}</span><span class="fitb-correct-inline">${q.answer}</span>${q.sentence_after}`;
        }
      });
    });

  } else if (q.type === 'matching') {
    const lefts = q.pairs.map(p => p.left);
    const rights = [...q.pairs.map(p => p.right)].sort(() => Math.random() - 0.5);
    let selectedLeft = null;
    const matches = {};

    interactive.innerHTML = `
      <div class="match-grid">
        <div>
          <p class="match-col-label">Item</p>
          ${lefts.map((l, i) => `<button class="match-item" data-side="left" data-idx="${i}">${l}</button>`).join('')}
        </div>
        <div>
          <p class="match-col-label">Match</p>
          ${rights.map((r, i) => `<button class="match-item" data-side="right" data-val="${r}">${r}</button>`).join('')}
        </div>
      </div>`;

    function checkAllMatched() {
      actionBtn.disabled = Object.keys(matches).length < lefts.length;
    }

    interactive.querySelectorAll('[data-side="left"]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        // If this one is already paired, unpair it first
        if (btn.classList.contains('paired')) {
          const pairedVal = matches[btn.dataset.idx];
          delete matches[btn.dataset.idx];
          btn.classList.remove('paired');
          const rightBtn = interactive.querySelector(`[data-side="right"][data-val="${pairedVal}"]`);
          if (rightBtn) { rightBtn.classList.remove('paired'); rightBtn.disabled = false; }
          checkAllMatched();
        }
        interactive.querySelectorAll('[data-side="left"]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedLeft = btn.dataset.idx;
      });
    });

    interactive.querySelectorAll('[data-side="right"]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (selectedLeft === null || btn.disabled) return;
        const leftBtn = interactive.querySelector(`[data-side="left"][data-idx="${selectedLeft}"]`);
        leftBtn.classList.remove('selected');
        leftBtn.classList.add('paired');
        btn.classList.add('paired');
        btn.disabled = true;
        matches[selectedLeft] = btn.dataset.val;
        selectedLeft = null;
        checkAllMatched();
      });
    });

    actionBtn.addEventListener('click', () => {
      let allCorrect = true;
      lefts.forEach((l, i) => {
        const correctRight = q.pairs[i].right;
        if (matches[i] !== correctRight) allCorrect = false;
      });
      handleAnswer(q, allCorrect, () => {
        interactive.querySelectorAll('.match-item').forEach(b => b.disabled = true);
        lefts.forEach((l, i) => {
          const leftBtn = interactive.querySelector(`[data-side="left"][data-idx="${i}"]`);
          const correctRight = q.pairs[i].right;
          const isCorrect = matches[i] === correctRight;
          leftBtn.classList.remove('paired');
          leftBtn.classList.add(isCorrect ? 'matched-correct' : 'matched-incorrect');
        });
      });
    });
  }
}

function handleAnswer(q, isCorrect, lockUI) {
  if (answeredCurrent) return;
  answeredCurrent = true;
  if (isCorrect) correctCount++;

  lockUI();

  const feedbackEl = document.getElementById('q-feedback');
  feedbackEl.innerHTML = `
    <div class="feedback-box ${isCorrect ? 'correct' : 'incorrect'}">
      <span class="feedback-icon ${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? '✓' : '✕'}</span>
      <div>
        <p class="feedback-title ${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? "That's right." : 'Not quite.'}</p>
        <p class="feedback-text">${isCorrect ? q.feedback_correct : q.feedback_incorrect}</p>
        ${isCorrect ? `<span class="xp-pill">+${lessonData.xp_per_question} XP</span>` : ''}
      </div>
    </div>`;

  const actionBtn = document.getElementById('action-btn');
  actionBtn.disabled = false;
  actionBtn.textContent = currentQIndex < lessonData.questions.length - 1 ? 'Next question →' : 'Finish lesson →';
  if (!isCorrect) actionBtn.classList.add('incorrect-next');

  if (isCorrect) {
    awardXp('lesson_answer');
  }

  actionBtn.onclick = () => {
    currentQIndex++;
    if (currentQIndex < lessonData.questions.length) {
      renderQuestion(lessonData, currentQIndex);
      updateProgressBar();
    } else {
      finishLesson();
    }
  };
}

function updateProgressBar() {
  const totalSteps = lessonData.questions.length + 1; // +1 for reading
  const pct = Math.round(((currentQIndex + 1) / totalSteps) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${currentQIndex + 1} / ${totalSteps}`;
}

async function awardXp(action) {
  try {
    await fetch(`${PROGRESS_API.replace('/progress','/profile')}/xp`, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action }),
    });
  } catch (e) {}
}

async function finishLesson() {
  await awardXp('lesson_complete');

  await fetch(`${PROGRESS_API}/update`, {
    method: 'POST', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      course: courseParam, unit: unitParam, lesson: lessonParam,
      status: 'complete', score: correctCount, max_score: lessonData.questions.length,
    }),
  });

  renderCompletion();
}

function renderCompletion() {
  const totalXp = correctCount * lessonData.xp_per_question + lessonData.completion_xp;
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="complete-wrap">
      <div class="complete-card">
        <div class="complete-top">
          <div class="complete-seal"><span>S</span></div>
          <h1 class="complete-title">Lesson complete.</h1>
          <p class="complete-sub">${lessonData.title} · Unit ${unitParam}, Lesson ${lessonParam}</p>
        </div>
        <div class="stats-row">
          <div class="stat"><p class="stat-value">${correctCount}/${lessonData.questions.length}</p><p class="stat-label">Correct</p></div>
          <div class="stat"><p class="stat-value">+${totalXp}</p><p class="stat-label">XP earned</p></div>
          <div class="stat"><p class="stat-value">${Math.round((correctCount/lessonData.questions.length)*100)}%</p><p class="stat-label">Score</p></div>
        </div>
        <div class="complete-actions">
          <a class="btn-secondary" href="/cellbiology">Back to unit</a>
          <a class="btn-primary" href="/cellbiology">Continue →</a>
        </div>
      </div>
    </div>`;
}

async function init() {
  try {
    const sessionRes = await fetch(`${API}/me`, { credentials: 'include' });
    const sessionData = await sessionRes.json();
    if (!sessionData.ok) { window.location.href = '/'; return; }

    const user = sessionData.user;
    const level = calcLevel(user.xp);
    const displayName = user.first_name || user.username;

    document.getElementById('nav-avatar').textContent = initials(displayName);
    document.getElementById('nav-username').textContent = displayName;
    document.getElementById('nav-level').textContent = LEVEL_TITLES[level - 1];

    lessonData = await loadLesson();

    document.getElementById('bar-unit').textContent = `Unit ${unitParam} · Lesson ${lessonParam}`;
    document.getElementById('bar-name').textContent = lessonData.title;

    renderReadSection(lessonData);

    // Render first question after read section
    const continueWrap = document.createElement('div');
    continueWrap.style.display = 'flex';
    continueWrap.style.justifyContent = 'flex-end';
    continueWrap.innerHTML = `<button class="action-btn" id="start-questions-btn">Start questions →</button>`;
    document.getElementById('lesson-content').appendChild(continueWrap);

    document.getElementById('start-questions-btn').addEventListener('click', () => {
      continueWrap.remove();
      renderQuestion(lessonData, 0);
      updateProgressBar();
    });

    document.getElementById('progress-label').textContent = `0 / ${lessonData.questions.length + 1}`;

    document.body.classList.remove('loading');
    document.body.classList.add('ready');

  } catch (e) {
    console.error(e);
    document.getElementById('lesson-content').innerHTML = '<p style="color:var(--mute); font-size:13px;">Could not load this lesson. Please go back and try again.</p>';
    document.body.classList.remove('loading');
    document.body.classList.add('ready');
  }
}

init();

const navUser = document.getElementById('nav-user');
const dropdown = document.getElementById('nav-dropdown');
navUser.addEventListener('click', (e) => { e.stopPropagation(); const open = dropdown.classList.toggle('open'); navUser.setAttribute('aria-expanded', open); });
document.addEventListener('click', () => { dropdown.classList.remove('open'); navUser.setAttribute('aria-expanded', 'false'); });
navUser.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navUser.click(); } });
document.getElementById('signout-btn').addEventListener('click', async () => {
  try { await fetch(`${API}/logout`, { method: 'POST', credentials: 'include' }); } catch (e) {}
  window.location.href = '/';
});
</script>
