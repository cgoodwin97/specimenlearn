<head>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20x%3D%224%22%20y%3D%224%22%20width%3D%2256%22%20height%3D%2256%22%20rx%3D%2212%22%20fill%3D%22%23EAEEE6%22/%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2224%22%20fill%3D%22none%22%20stroke%3D%22%231F6F5C%22%20stroke-width%3D%221.5%22/%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2220%22%20fill%3D%22%231F6F5C%22/%3E%3Ctext%20x%3D%2232%22%20y%3D%2234%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22central%22%20font-family%3D%22Fraunces%2C%20Georgia%2C%20serif%22%20font-style%3D%22italic%22%20font-size%3D%2224%22%20fill%3D%22%23EAEEE6%22%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,400;1,500&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #EAEEE6;
    --card: #FAFBF7;
    --ink: #1E2A22;
    --moss: #1F6F5C;
    --rust: #B6481E;
    --mute: #6E7568;
    --line: #D4D8D0;
    --nav-bg: #1E2A22;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
  }

  /* ── NAV ── */
  .nav {
    width: 210px;
    flex-shrink: 0;
    background: var(--nav-bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 1.5rem 1rem;
    position: fixed;
    top: 0; left: 0; bottom: 0;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 0.25rem;
    margin-bottom: 2rem;
    text-decoration: none;
  }

  .nav-seal {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--moss);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .nav-seal span {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--paper);
    font-size: 15px; line-height: 1;
  }

  .nav-title-wrap { display: flex; flex-direction: column; }

  .nav-title-top {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; color: rgba(234,238,230,0.4);
    letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.3;
  }

  .nav-title {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 16px; color: var(--paper); line-height: 1.1;
  }

  .nav-items { display: flex; flex-direction: column; gap: 2px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 8px;
    cursor: pointer; text-decoration: none;
    transition: background 0.12s;
  }

  .nav-item:hover:not(.active) { background: rgba(234,238,230,0.05); }
  .nav-item.active { background: rgba(234,238,230,0.09); }

  .nav-icon { font-size: 16px; color: rgba(234,238,230,0.45); line-height: 1; }
  .nav-item.active .nav-icon, .nav-item:hover .nav-icon { color: var(--paper); }

  .nav-text { font-size: 13px; color: rgba(234,238,230,0.45); }
  .nav-item.active .nav-text, .nav-item:hover .nav-text { color: var(--paper); font-weight: 500; }

  .nav-spacer { flex: 1; }

  .nav-user {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 10px; border-radius: 8px;
    background: rgba(234,238,230,0.06);
    cursor: pointer; position: relative;
  }

  .nav-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--moss);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; color: var(--paper);
    flex-shrink: 0; font-family: 'Inter', sans-serif;
  }

  .nav-user-info { flex: 1; min-width: 0; }
  .nav-user-name { font-size: 12px; color: rgba(234,238,230,0.8); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-user-level { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: rgba(234,238,230,0.35); letter-spacing: 0.04em; }

  .nav-dropdown {
    position: absolute; bottom: calc(100% + 6px); left: 0; right: 0;
    background: #2a3a30; border: 1px solid rgba(234,238,230,0.1);
    border-radius: 8px; overflow: hidden; display: none; z-index: 10;
  }

  .nav-dropdown.open { display: block; }

  .nav-dropdown-item {
    display: block; width: 100%; padding: 10px 14px;
    font-family: 'Inter', sans-serif; font-size: 12px;
    color: rgba(234,238,230,0.7); background: none; border: none;
    text-align: left; cursor: pointer; text-decoration: none; transition: background 0.1s;
  }

  .nav-dropdown-item:hover { background: rgba(234,238,230,0.06); color: var(--paper); }
  .nav-dropdown-item.signout { color: rgba(182,72,30,0.8); border-top: 1px solid rgba(234,238,230,0.07); }
  .nav-dropdown-item.signout:hover { background: rgba(182,72,30,0.08); color: #B6481E; }

  /* ── MAIN ── */
  .main {
    margin-left: 210px;
    flex: 1;
    padding: 2rem 2.5rem;
    max-width: 780px;
  }

  .breadcrumb {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--mute); margin-bottom: 0.5rem;
    display: flex; align-items: center; gap: 6px;
  }

  .breadcrumb a { color: var(--mute); text-decoration: none; }
  .breadcrumb a:hover { color: var(--moss); }

  .course-heading {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 28px; color: var(--ink);
    margin-bottom: 0.25rem; line-height: 1.2;
  }

  .course-sub { font-size: 13px; color: var(--mute); margin-bottom: 1.75rem; }

  /* Course progress strip */
  .course-strip {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 11px 16px; margin-bottom: 2rem;
  }

  .course-strip-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--moss); font-weight: 500; white-space: nowrap;
  }

  .course-strip-bar {
    flex: 1; height: 5px; background: var(--line);
    border-radius: 99px; overflow: hidden;
  }

  .course-strip-fill {
    height: 100%; background: var(--moss);
    border-radius: 99px; transition: width 0.6s ease; width: 0%;
  }

  .course-strip-pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--mute); white-space: nowrap;
  }

  /* Units */
  .unit-block { margin-bottom: 2rem; }

  .unit-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 0.75rem;
  }

  .unit-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mute);
  }

  .unit-title {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 18px; color: var(--ink); line-height: 1.2;
  }

  /* Lesson path */
  .lesson-path { display: flex; flex-direction: column; }

  .lesson-row { display: flex; align-items: stretch; }

  .connector-col {
    display: flex; flex-direction: column;
    align-items: center; width: 36px; flex-shrink: 0;
  }

  .connector-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid var(--line); background: var(--card);
    flex-shrink: 0; margin-top: 20px; position: relative; z-index: 1;
    transition: border-color 0.2s, background 0.2s;
  }

  .connector-dot.complete { background: var(--moss); border-color: var(--moss); }
  .connector-dot.active { border-color: var(--moss); box-shadow: 0 0 0 3px rgba(31,111,92,0.15); }
  .connector-dot.locked { background: var(--paper); border-color: var(--line); }

  .connector-line {
    width: 2px; flex: 1; min-height: 12px;
    background: var(--line); transition: background 0.2s;
  }

  .connector-line.complete { background: var(--moss); }

  /* Lesson card */
  .lesson-card {
    flex: 1; margin: 10px 0 10px 14px;
    padding: 13px 16px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; text-decoration: none; color: inherit;
    transition: border-color 0.15s;
    display: block;
  }

  .lesson-card:hover:not(.locked) { border-color: var(--moss); }
  .lesson-card.active { border-color: var(--moss); background: #fff; }
  .lesson-card.locked { opacity: 0.45; cursor: default; pointer-events: none; }

  .lesson-card-top {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 3px;
  }

  .lesson-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--mute);
    letter-spacing: 0.07em; text-transform: uppercase;
  }

  .lesson-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; padding: 2px 8px;
    border-radius: 99px; letter-spacing: 0.04em;
  }

  .lesson-badge.complete { background: rgba(31,111,92,0.1); color: var(--moss); }
  .lesson-badge.active { background: rgba(31,111,92,0.1); color: var(--moss); }
  .lesson-badge.locked { background: var(--line); color: var(--mute); }

  .lesson-title { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
  .lesson-desc { font-size: 12px; color: var(--mute); line-height: 1.5; }

  .lesson-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--moss); margin-top: 6px;
  }

  /* Review card (last lesson in unit) */
  .lesson-card.review {
    background: var(--moss); border-color: var(--moss);
  }

  .lesson-card.review.locked {
    background: var(--moss); border-color: var(--moss); opacity: 0.35;
  }

  .lesson-card.review .lesson-num { color: rgba(234,238,230,0.6); }
  .lesson-card.review .lesson-title { color: var(--paper); }
  .lesson-card.review .lesson-desc { color: rgba(234,238,230,0.65); }
  .lesson-card.review .lesson-score { color: rgba(234,238,230,0.8); }
  .lesson-card.review .lesson-badge { background: rgba(234,238,230,0.15); color: var(--paper); }

  body.loading .main { opacity: 0; }
  body.ready .main { opacity: 1; transition: opacity 0.2s; }
</style>
</head>

</nav>

<main class="main">
  <div class="breadcrumb">
    <a href="/home">Home</a>
    <span>›</span>
    <span>Cell Biology</span>
  </div>

  <h1 class="course-heading">Cell Biology</h1>
  <p class="course-sub">Build your understanding from the ground up — starting with the cell itself.</p>

  <div class="course-strip">
    <span class="course-strip-label" id="strip-label">Course progress</span>
    <div class="course-strip-bar">
      <div class="course-strip-fill" id="strip-fill"></div>
    </div>
    <span class="course-strip-pct" id="strip-pct">0%</span>
  </div>

  <div id="units-container"></div>
</main>

<script>
const API = '/auth';
const PROGRESS_API = '/progress';
const COURSE = 'cell_biology';

const LEVEL_TITLES = [
  'Curious Mind','Microscopist','Lab Trainee','Field Researcher',
  'Lab Technician','Research Associate','Research Scientist',
  'Senior Scientist','Research Fellow','Principal Scientist',
];
const LEVEL_THRESHOLDS = [0,100,300,600,1000,1500,2200,3000,4000,5500];

function calcLevel(xp) {
  let level = 1;
  for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
    if (xp >= LEVEL_THRESHOLDS[i]) { level = i + 1; break; }
  }
  return Math.min(level, 10);
}

function initials(name) { return name.slice(0, 2).toUpperCase(); }

// Curriculum definition
const CURRICULUM = [
  {
    unit: 1,
    title: 'The Cell',
    lessons: [
      { lesson: 1, title: 'What is a cell?', desc: 'The fundamental unit of life and why cells matter.' },
      { lesson: 2, title: 'Two kinds of cells', desc: 'Prokaryotes vs eukaryotes — the most important distinction in cell biology.' },
      { lesson: 3, title: "The cell's boundary", desc: 'What the cell membrane does and why compartmentalisation matters.' },
      { lesson: 4, title: 'Inside the eukaryotic cell', desc: 'A first look at the major compartments: nucleus, mitochondria, and more.' },
      { lesson: 5, title: 'Unit review', desc: 'Mixed questions across all four lessons. Unlock Unit 2 on completion.', review: true },
    ],
  },
];

// Build progress map keyed by "unit-lesson"
function buildProgressMap(progressRows) {
  const map = {};
  for (const row of progressRows) {
    map[`${row.unit}-${row.lesson}`] = row;
  }
  return map;
}

// Determine lesson state: 'complete', 'active', 'locked'
function lessonState(unitIdx, lessonIdx, map, curriculum) {
  const unit = curriculum[unitIdx];
  const lesson = unit.lessons[lessonIdx];
  const key = `${unit.unit}-${lesson.lesson}`;
  const row = map[key];

  if (row && row.status === 'complete') return 'complete';

  // First lesson of first unit is always unlocked
  if (unitIdx === 0 && lessonIdx === 0) return 'active';

  // Check previous lesson
  let prevKey;
  if (lessonIdx > 0) {
    const prevLesson = unit.lessons[lessonIdx - 1];
    prevKey = `${unit.unit}-${prevLesson.lesson}`;
  } else if (unitIdx > 0) {
    // First lesson of a unit — check last lesson (review) of previous unit
    const prevUnit = curriculum[unitIdx - 1];
    const prevLesson = prevUnit.lessons[prevUnit.lessons.length - 1];
    prevKey = `${prevUnit.unit}-${prevLesson.lesson}`;
  }

  if (prevKey && map[prevKey] && map[prevKey].status === 'complete') return 'active';
  return 'locked';
}

function renderCurriculum(curriculum, progressMap) {
  const container = document.getElementById('units-container');
  container.innerHTML = '';

  let totalLessons = 0;
  let completedLessons = 0;

  curriculum.forEach((unit, unitIdx) => {
    totalLessons += unit.lessons.length;

    const unitEl = document.createElement('div');
    unitEl.className = 'unit-block';

    unitEl.innerHTML = `
      <div class="unit-header">
        <span class="unit-label">Unit ${unit.unit}</span>
        <span class="unit-title">${unit.title}</span>
      </div>
      <div class="lesson-path" id="path-${unit.unit}"></div>
    `;

    container.appendChild(unitEl);
    const path = unitEl.querySelector(`#path-${unit.unit}`);

    unit.lessons.forEach((lesson, lessonIdx) => {
      const key = `${unit.unit}-${lesson.lesson}`;
      const state = lessonState(unitIdx, lessonIdx, progressMap, curriculum);
      const row = progressMap[key];
      const isLast = lessonIdx === unit.lessons.length - 1;

      if (state === 'complete') completedLessons++;

      const rowEl = document.createElement('div');
      rowEl.className = 'lesson-row';

      // Connector
      const connectorEl = document.createElement('div');
      connectorEl.className = 'connector-col';
      connectorEl.innerHTML = `
        <div class="connector-dot ${state}"></div>
        ${!isLast ? `<div class="connector-line ${state === 'complete' ? 'complete' : ''}"></div>` : '<div style="flex:1"></div>'}
      `;

      // Card
      const cardTag = state === 'locked' ? 'div' : 'a';
      const cardEl = document.createElement(cardTag);
      cardEl.className = `lesson-card ${state}${lesson.review ? ' review' : ''}`;
      if (state !== 'locked') {
        cardEl.href = `/lesson?course=${COURSE}&unit=${unit.unit}&lesson=${lesson.lesson}`;
      }

      let badgeText = state === 'complete' ? 'Complete' : state === 'active' ? 'Up next' : 'Locked';
      let scoreHtml = '';

      if (state === 'complete' && row) {
        if (lesson.review) {
          scoreHtml = `<p class="lesson-score">${row.score}/${row.max_score} correct</p>`;
        } else {
          scoreHtml = `<p class="lesson-score">Complete</p>`;
        }
      } else if (state !== 'locked') {
        if (lesson.review) {
          scoreHtml = `<p class="lesson-score">Earn up to +75 XP</p>`;
        } else {
          scoreHtml = `<p class="lesson-score">Earn +15 XP</p>`;
        }
      }

      cardEl.innerHTML = `
        <div class="lesson-card-top">
          <span class="lesson-num">Lesson ${lesson.lesson}</span>
          <span class="lesson-badge ${state}">${badgeText}</span>
        </div>
        <p class="lesson-title">${lesson.title}</p>
        <p class="lesson-desc">${lesson.desc}</p>
        ${scoreHtml}
      `;

      rowEl.appendChild(connectorEl);
      rowEl.appendChild(cardEl);
      path.appendChild(rowEl);
    });
  });

  // Update course progress strip
  const pct = totalLessons > 0 ? Math.round((completedLessons / totalLessons) * 100) : 0;
  document.getElementById('strip-fill').style.width = pct + '%';
  document.getElementById('strip-pct').textContent = pct + '%';
  document.getElementById('strip-label').textContent =
    completedLessons === 0 ? 'Not started' :
    completedLessons === totalLessons ? 'Complete' :
    `${completedLessons} of ${totalLessons} lessons done`;
}

async function init() {
  try {
    const [sessionRes, progressRes] = await Promise.all([
      fetch(`${API}/me`, { credentials: 'include' }),
      fetch(`${PROGRESS_API}/get?course=${COURSE}`, { credentials: 'include' }),
    ]);

    const sessionData = await sessionRes.json();
    if (!sessionData.ok) { window.location.href = '/'; return; }

    const progressData = await progressRes.json();
    const progressMap = buildProgressMap(progressData.ok ? progressData.progress : []);

    const user = sessionData.user;
    const level = calcLevel(user.xp);
    const displayName = user.first_name || user.username;

    document.getElementById('nav-avatar').textContent = initials(displayName);
    document.getElementById('nav-username').textContent = displayName;
    document.getElementById('nav-level').textContent = LEVEL_TITLES[level - 1];

    renderCurriculum(CURRICULUM, progressMap);

    document.body.classList.remove('loading');
    document.body.classList.add('ready');

  } catch (e) {
    window.location.href = '/';
  }
}

init();

// Nav dropdown
const navUser = document.getElementById('nav-user');
const dropdown = document.getElementById('nav-dropdown');

navUser.addEventListener('click', (e) => {
  e.stopPropagation();
  const open = dropdown.classList.toggle('open');
  navUser.setAttribute('aria-expanded', open);
});

document.addEventListener('click', () => {
  dropdown.classList.remove('open');
  navUser.setAttribute('aria-expanded', 'false');
});

navUser.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navUser.click(); }
});

document.getElementById('signout-btn').addEventListener('click', async () => {
  try { await fetch(`${API}/logout`, { method: 'POST', credentials: 'include' }); } catch (e) {}
  window.location.href = '/';
});
</script>
</body>
